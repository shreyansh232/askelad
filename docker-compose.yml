services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: askelad-backend
    restart: always
    environment:
      - DEBUG=false
      - DATABASE_URL=${DATABASE_URL}
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import httpx; httpx.get('http://localhost:8000/health', timeout=5).raise_for_status()\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
