services:
  db:
    image: postgres:17
    container_name: askelad-db
    restart: always
    environment:
      POSTGRES_USER: askelad_user
      POSTGRES_PASSWORD: askelad_password
      POSTGRES_DB: askelad
    ports:
      - "5432:5432"
    volumes:
      - ./docker_data/postgres:/var/lib/postgresql/data
